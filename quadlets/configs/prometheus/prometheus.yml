global:
  scrape_interval: 60s
  evaluation_interval: 60s

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: "node"
    static_configs:
      - targets: ["192.168.0.1:9100"]

  - job_name: "teamspeak"
    static_configs:
      - targets: ["192.168.0.1:9189"]

  - job_name: "unbound"
    static_configs:
      - targets: ["192.168.0.1:9167"]

  - job_name: "blackbox_exporter"
    static_configs:
      - targets: ["192.168.0.1:9115"]

  - job_name: "blackbox_icmp"
    metrics_path: /probe
    params:
      module: [icmp]
    static_configs:
      - targets:
        # - 37.46.xx.xx (my default gateway)
        - sto-b3.ip.twelve99.net
        - lul1.ntp.se
        - got-shg5.obe.net
        - d-sb1-i.D.DE.NET.DTAG.DE
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: 192.168.0.1:9115
